<!DOCTYPE html>
<html lang="en" data-theme="good">
<head>
<meta charset="UTF-8">
<title>Farm Goals - AQW Wiki Enhanced</title>
<script src="../pages-boot.js"></script>
<link rel="stylesheet" href="../content/hover.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@font-face { font-family: "Inter"; src: url("../../assets/fonts/inter.woff2") format("woff2"); font-weight: 100 900; }
@font-face { font-family: "Roboto Condensed"; src: url("../../assets/fonts/roboto-condensed.woff2") format("woff2"); font-weight: 100 900; }
@font-face { font-family: "Cinzel"; src: url("../../assets/fonts/cinzel.woff2") format("woff2"); font-weight: 700; }
:root, [data-theme="good"] {
    --surface-page: #EDEDEA; --surface: #FBFBFA; --raised: #FFFFFF; --sunken: #E3E3DF;
    --text: #26251F; --text-2: #55534A; --muted: #85817A;
    --accent: #9E1D24; --accent-soft: rgba(158,29,36,0.08);
    --gold: #A97E2F; --gold-bright: #C9A254; --gold-soft: rgba(169,126,47,0.12);
    --owned: #1F7A31; --border: rgba(38,37,31,0.13); --border-strong: rgba(38,37,31,0.25);
    --shadow-s: 0 1px 2px rgba(38,37,31,0.05), 0 1px 6px rgba(38,37,31,0.05);
    --shadow-m: 0 2px 6px rgba(38,37,31,0.07), 0 8px 24px rgba(38,37,31,0.09);
}
[data-theme="evil"] {
    --surface-page: #1B1C21; --surface: #232429; --raised: #2A2B31; --sunken: #17181C;
    --text: #E9E5DC; --text-2: #B5AFA2; --muted: #837D71;
    --accent: #D8433B; --accent-soft: rgba(216,67,59,0.12);
    --gold: #D4A853; --gold-bright: #E8C57A; --gold-soft: rgba(212,168,83,0.12);
    --owned: #5FBF6E; --border: rgba(233,229,220,0.10); --border-strong: rgba(233,229,220,0.20);
    --shadow-s: 0 1px 2px rgba(0,0,0,0.30), 0 1px 6px rgba(0,0,0,0.25);
    --shadow-m: 0 2px 6px rgba(0,0,0,0.35), 0 8px 24px rgba(0,0,0,0.35);
}
body {
    background: var(--surface-page);
    color: var(--text);
    font: 14px/1.6 "Inter", "Segoe UI", system-ui, sans-serif;
    padding: 40px 20px 80px;
}
.wrap { max-width: 640px; margin: 0 auto; }
/* Wiki title face (the wiki renders titles in the browser's default serif);
   Cinzel is reserved for the brand wordmark alone. */
h1 { font-family: "Times New Roman", Times, serif; font-weight: 400; font-size: 28px; margin-bottom: 4px; }
.sub { color: var(--muted); font-size: 13px; margin-bottom: 26px; }
.sub strong { color: var(--text-2); }

.card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow-s);
    transition: transform 180ms cubic-bezier(0.34, 1.3, 0.64, 1), box-shadow 130ms ease, opacity 130ms ease;
}
.card.dragging { opacity: 0.55; box-shadow: var(--shadow-m); transform: scale(1.02); }
.card.drop-above { transform: translateY(4px); }
.handle {
    cursor: grab;
    color: var(--muted);
    font-size: 16px;
    letter-spacing: 2px;
    user-select: none;
    padding: 4px 2px;
}
.handle:active { cursor: grabbing; }
.card .num {
    width: 26px; height: 26px;
    flex: none;
    display: grid;
    place-items: center;
    border-radius: 8px;
    background: var(--gold-soft);
    color: var(--gold-bright);
    font-weight: 700;
    font-size: 12.5px;
}
.copy { flex: 1; min-width: 0; }
.copy a { color: var(--text); font-weight: 600; font-size: 14.5px; text-decoration: none; }
.copy a:hover { color: var(--accent); }
.meter { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
.bar { flex: 1; max-width: 260px; height: 7px; background: var(--sunken); border: 1px solid var(--border); border-radius: 999px; overflow: hidden; }
.bar span { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--gold)); transition: width 400ms ease; }
.pct { font-size: 12px; font-weight: 700; color: var(--text-2); font-variant-numeric: tabular-nums; min-width: 36px; }
.del {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--raised);
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
}
.del:hover { color: var(--accent); border-color: var(--border-strong); }
.empty { color: var(--muted); padding: 40px 0; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
    <h1>Farm Goals</h1>
    <p class="sub">Drag the <strong>⋮⋮</strong> handle to reorder. Progress is your best merge recipe, from your synced inventory.</p>
    <div id="list"></div>
</div>
<script src="../data/tags.js"></script>
<script src="../data/legend-pages.js"></script><script src="../common.js"></script>
<script src="../content/hover.js"></script>
<script src="goals.js"></script>
</body>
</html>
